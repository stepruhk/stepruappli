services:
  - type: web
    name: eduboost-ai
    runtime: node
    plan: free
    autoDeploy: true
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: PROF_PASSWORD
        sync: false
      - key: COURSE_PASSWORD_1
        sync: false
      - key: COURSE_PASSWORD_2
        sync: false
      - key: COURSE_PASSWORD_3
        sync: false
      - key: COURSE_PASSWORD_8
        sync: false
      - key: COURSE_PASSWORD_4
        sync: false
      - key: COURSE_PASSWORD_5
        sync: false
      - key: COURSE_PASSWORD_6
        sync: false
      - key: COURSE_PASSWORD_7
        sync: false
      - key: PODCAST_RSS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_LAUNCH_DATE
        sync: false
      - key: ACCESS_METRICS_BASE_TOTAL
        sync: false
      - key: ACCESS_METRICS_BASE_STUDENT
        sync: false
      - key: ACCESS_METRICS_BASE_PROFESSOR
        sync: false
